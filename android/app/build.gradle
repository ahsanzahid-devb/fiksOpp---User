plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
def flutterVersionName = localProperties.getProperty('flutter.versionName')

// Always align with pubspec.yaml (fixes Play "version code already used" when
// Android Studio / Gradle uses stale flutter.versionCode from local.properties).
def pubspecFile = new File(rootProject.projectDir.parentFile, 'pubspec.yaml')
if (pubspecFile.exists()) {
    pubspecFile.eachLine { line ->
        if (line.trim().startsWith('version:')) {
            def raw = line.replaceFirst(/^\s*version:\s*/, '').trim().replaceAll(/^"|"$/, '')
            def parts = raw.split('\\+', 2)
            if (parts.length == 2) {
                flutterVersionName = parts[0].trim()
                flutterVersionCode = parts[1].trim().replaceAll('[^0-9]', '')
            }
        }
    }
}

if (flutterVersionCode == null || flutterVersionCode.isEmpty()) {
    flutterVersionCode = '1'
}
if (flutterVersionName == null || flutterVersionName.isEmpty()) {
    flutterVersionName = '1.0'
}

android {
    namespace "buzz.inoor.fiksopp"
    compileSdkVersion 36
    buildToolsVersion "36.1.0" // Using existing installed build tools
    ndkVersion = "29.0.14206865" // Using existing installed NDK version

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = '11'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId 'buzz.inoor.fiksopp'
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        debug {
            shrinkResources false
            minifyEnabled false
            signingConfig signingConfigs.debug
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }

        release {
            shrinkResources false
            minifyEnabled false
            signingConfig signingConfigs.release
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "androidx.appcompat:appcompat:1.4.2"
    implementation(platform("com.google.firebase:firebase-bom:32.4.0"))
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.android.material:material:1.5.0'
    implementation 'phonepe.intentsdk.android.release:IntentSDK:2.3.0'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}
